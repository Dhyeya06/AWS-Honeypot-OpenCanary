{
    "device.node_id": "opencanary-aws-honeypot",
    "device.listen_addr": "0.0.0.0",
    "logger": {
        "class": "PyLogger",
        "kwargs": {
            "formatters": {
                "plain": {
                    "format": "%(message)s"
                }
            },
            "handlers": {
              "Rotating": {
                "class": "logging.handlers.RotatingFileHandler",
                "filename": "/var/log/opencanary/opencanary.log",
                "maxBytes": 10485760,
                "backupCount": 3
            }
        }
    }
},
    "ftp.enabled": true,
    "ftp.port": 21,
    "ftp.banner": "FTP server ready",
    "http.enabled": true,
    "http.port": 80,
    "http.skin": "nasLogin",
    "http.banner": "Apache/2.4.41 (Ubuntu)",
    "httpproxy.enabled": false,
    "mysql.enabled": true,
    "mysql.port": 3306,
    "mysql.banner": "5.7.32-0ubuntu0.18.04.1",
    "ssh.enabled": true,
    "ssh.port": 22,
    "ssh.version": "SSH-2.0-OpenSSH_7.4",
    "smb.enabled": false,
    "telnet.enabled": false,
    "portscan.enabled": true,
    "portscan.ignore_localhost": false,
    "snmp.enabled": false,
    "redis.enabled": false,
    "mssql.enabled": false
}
